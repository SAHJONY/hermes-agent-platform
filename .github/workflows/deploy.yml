name: Deploy to Vercel

on:
  push:
    branches:
      - master

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Create Vercel project settings
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'$VERCEL_PROJECT_ID'","orgId":"'$VERCEL_ORG_ID'","projectName":"hermes-agent-platform"}' > .vercel/project.json

      - name: Deploy to Vercel
        run: |
          echo "=== Vercel Debug Info ==="
          echo "Token length: ${#VERCEL_TOKEN}"
          echo "Token prefix: ${VERCEL_TOKEN:0:10}"
          echo "ORG ID: $VERCEL_ORG_ID"
          echo "PROJECT ID: $VERCEL_PROJECT_ID"
          echo "=== Starting Deploy ==="
          npx vercel deploy --prod --token=$VERCEL_TOKEN --yes --debug 2>&1 | head -100

  test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build