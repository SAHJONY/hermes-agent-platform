name: Deploy to Vercel

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.REF }}
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify Vercel Token
        run: |
          echo "Testing Vercel authentication..."
          echo "Token prefix: ${VERCEL_TOKEN:0:8}..."
          echo "Token length: ${#VERCEL_TOKEN}"
          
          # Test token via API
          RESPONSE=$(curl -s -w "%{http_code}" -o /tmp/vercel_response.json -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/user")
          echo "API Response code: $RESPONSE"
          cat /tmp/vercel_response.json | head -c 200

      - name: Deploy to Vercel
        run: |
          echo "Starting Vercel deployment..."
          npx vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes

  test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build